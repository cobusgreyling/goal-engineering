name: goal-audit PR

on:
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./.github/actions/goal-audit
        with:
          path: .
          min-level: G2
          comment-on-pr: 'false'